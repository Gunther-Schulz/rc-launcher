# rc-launcher — Claude Remote Control session launcher, Coolify template.
#
# Auth: HTTP Basic Auth is enforced inside the FastAPI app (Coolify v4-beta's
# native HTTP-Basic-Auth toggle does NOT inject Traefik middleware labels for
# compose-deploy services, so we wire RFC-7617 ourselves). On install Coolify
# auto-generates SERVICE_PASSWORD_ADMIN; the username defaults to `admin`.
# Both visible/editable in Coolify's Environment Variables panel.

services:
  rcl:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - SERVICE_FQDN_RCL_8080
      - RCL_USERNAME=admin
      - RCL_PASSWORD=$SERVICE_PASSWORD_ADMIN
      # Whitespace-separated list of extra apt packages installed on each
      # boot. Convenient for occasional needs without rebuilding the image.
      # Heavy / always-needed packages should go in the Dockerfile instead.
      - APT_EXTRA_PACKAGES=
    expose:
      - "8080"
    labels:
      # Coolify v4-beta doesn't auto-wire Traefik for compose deploys and
      # escapes $ in label values, so we use a low-priority catch-all
      # HostRegexp. Any other Coolify app with a specific Host rule wins;
      # this catches our service's assigned FQDN.
      - traefik.enable=true
      - traefik.http.routers.rcl-http.rule=HostRegexp(`.+`)
      - traefik.http.routers.rcl-http.entryPoints=http
      - traefik.http.routers.rcl-http.priority=1
      - traefik.http.services.rcl-http.loadbalancer.server.port=8080
    volumes:
      # Full home volume so user-installed tools (uv tool install, pipx,
      # cargo, npm i -g via redirected prefix, dotfiles) persist across
      # redeploys. The .claude subdir gets its own volume on top of this so
      # credentials/conversation history are independently snapshottable.
      - home:/home/node
      - claude:/home/node/.claude
      - workspace:/workspace
      - data:/var/lib/rcl
    restart: unless-stopped

volumes:
  home:
  claude:
  workspace:
  data:
