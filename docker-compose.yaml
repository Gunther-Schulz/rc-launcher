# rc-launcher — Claude Remote Control session launcher, Coolify template.
#
# Post-deploy you enable HTTP Basic Auth on the app in Coolify UI
# (General → HTTP Basic Auth → toggle on, set user+password). Traefik
# gates every request at the edge; the app itself has no auth code.

services:
  rcl:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - SERVICE_FQDN_RCL_8080
    expose:
      - "8080"
    labels:
      # Coolify v4-beta doesn't auto-wire Traefik for compose deploys and
      # escapes $ in label values, so we catch-all at the lowest priority.
      # When HTTP Basic Auth is enabled in Coolify, Coolify injects its
      # middleware labels automatically alongside these.
      - traefik.enable=true
      - traefik.http.routers.rcl-http.rule=HostRegexp(`.+`)
      - traefik.http.routers.rcl-http.entryPoints=http
      - traefik.http.routers.rcl-http.priority=1
      - traefik.http.services.rcl-http.loadbalancer.server.port=8080
    volumes:
      - claude:/home/node/.claude
      - gh-config:/home/node/.config/gh
      - workspace:/workspace
      - data:/var/lib/rcl
    restart: unless-stopped

volumes:
  claude:
  gh-config:
  workspace:
  data:
